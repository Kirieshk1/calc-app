<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инженерный калькулятор</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .calculator {
            width: 95%;
            max-width: 360px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            box-sizing: border-box;
        }
        .display {
            width: 100%;
            height: 60px;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 22px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        button {
            padding: 12px 2px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            background-color: #e0e0e0;
            color: #000;
            cursor: pointer;
            transition: opacity 0.1s ease;
        }
        button:active {
            opacity: 0.7;
        }
        button.math-func {
            background-color: #d1e4f9;
            font-size: 13px;
        }
        button.op {
            background-color: #f9dbbd;
        }
        button.action {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            grid-column: span 2;
        }
        button.clear {
            background-color: #ff8b8b;
            color: white;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" class="display" id="display" readonly placeholder="0">
    <div class="grid">
        <!-- Системные и скобки -->
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="backspace()">←</button>
        <button onclick="input('(')">(</button>
        <button onclick="input(')')">)</button>
        <button class="op" onclick="input('/')">/</button>

        <!-- Инженерные функции -->
        <button class="math-func" onclick="input('sin(')">sin</button>
        <button class="math-func" onclick="input('cos(')">cos</button>
        <button class="math-func" onclick="input('tan(')">tan</button>
        <button class="math-func" onclick="input('rad(')">rad</button>
        <button class="op" onclick="input('*')">*</button>

        <button class="math-func" onclick="input('ln(')">ln</button>
        <button class="math-func" onclick="input('lg(')">lg</button>
        <button class="math-func" onclick="input('sqrt(')">√</button>
        <button class="math-func" onclick="input('^')">xʸ</button>
        <button class="op" onclick="input('-')">-</button>

        <!-- Цифры и константы -->
        <button onclick="input('7')">7</button>
        <button onclick="input('8')">8</button>
        <button onclick="input('9')">9</button>
        <button class="math-func" onclick="input('pi')">π</button>
        <button class="op" onclick="input('+')">+</button>

        <button onclick="input('4')">4</button>
        <button onclick="input('5')">5</button>
        <button onclick="input('6')">6</button>
        <button class="math-func" onclick="input('e')">e</button>
        <button class="math-func" onclick="input('fact(')">x!</button>

        <button onclick="input('1')">1</button>
        <button onclick="input('2')">2</button>
        <button onclick="input('3')">3</button>
        <button class="action" onclick="sendToBot()">Вычислить</button>

        <button onclick="input('0')">0</button>
        <button onclick="input('.')">.</button>
        <button class="math-func" onclick="input('abs(')">|x|</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const display = document.getElementById('display');

    function input(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = '';
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }

    function sendToBot() {
        const value = display.value;
        if (value.trim() === "") {
            tg.close();
            return;
        }
        tg.sendData(value);
        tg.close();
    }
</script>
</body>
</html>
